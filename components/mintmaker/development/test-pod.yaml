apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-pod
  namespace: mintmaker
spec:
  template:
    metadata:
      labels: []
    spec:
      containers:
      - name: test-pod
        resources:
          limits:
            cpu: 500m
            memory: 2048Mi
          requests:
            cpu: 100m
            memory: 256Mi
        image: quay.io/konflux-ci/mintmaker-renovate-image:latest
        command:
          - /bin/sh
