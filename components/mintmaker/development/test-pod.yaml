apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-pod
  namespace: mintmaker
spec:
  selector:
    matchLabels:
      control-plane: test-pod
  template:
    metadata:
      labels:
        control-plane: test-pod
    spec:
      containers:
      - name: test-pod
        resources:
          limits:
            cpu: 500m
            memory: 2048Mi
          requests:
            cpu: 100m
            memory: 256Mi
        image: quay.io/konflux-ci/mintmaker-renovate-image:latest
        command:
          - sleep
        args:
          - infinity
      securityContext:
        runAsUser: 1000

